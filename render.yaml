databases:
  - name: nkula-wua-db
    databaseName: nkula_wua
    region: frankfurt
    plan: free

services:
  - type: web
    name: nkula-wua
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    releaseCommand: python manage.py migrate && python manage.py create_superuser && python manage.py loaddata seed_data.json
    startCommand: gunicorn accounting_project.wsgi:application --workers 2 --worker-class sync --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: accounting_project.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "nkula-wua.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: nkula-wua-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: PYTHON_VERSION
        value: "3.10.11"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin123"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
