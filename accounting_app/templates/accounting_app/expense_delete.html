{% extends "accounting_app/base.html" %}
{% block title %}Delete Expense{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Delete Expense</h4>
</div>

<div class="card">
    <div class="card-body">
        <h4 class="text-danger">Delete Expense</h4>
        <p>Are you sure you want to delete expense <strong>{{ expense.expense_number }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
