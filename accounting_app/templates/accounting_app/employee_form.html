{% extends "accounting_app/base.html" %}
{% block title %}{{ action }} Employee{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-person-plus"></i> {{ action }} Employee</h5>
            </div>
            <div class="card-body">
                <form method="POST" id="employeeForm">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Name *</label>
                            <input type="text" name="name" class="form-control" required value="{{ form.name.value|default:'' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Sex *</label>
                            <select name="sex" class="form-select" required>
                                <option value="">-- Select Sex --</option>
                                <option value="M" {% if form.sex.value == 'M' %}selected{% endif %}>Male</option>
                                <option value="F" {% if form.sex.value == 'F' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Village *</label>
                            <input type="text" name="village" class="form-control" required value="{{ form.village.value|default:'' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Scheme Present *</label>
                            <select name="scheme_present" class="form-select" required>
                                <option value="">-- Select Scheme --</option>
                                <option value="Mangale" {% if form.scheme_present.value == 'Mangale' %}selected{% endif %}>Mangale</option>
                                <option value="Dodza" {% if form.scheme_present.value == 'Dodza' %}selected{% endif %}>Dodza</option>
                                <option value="Nkala" {% if form.scheme_present.value == 'Nkala' %}selected{% endif %}>Nkala</option>
                                <option value="Milala" {% if form.scheme_present.value == 'Milala' %}selected{% endif %}>Milala</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Contact</label>
                            <input type="text" name="contact" class="form-control" placeholder="e.g. +265991234567" value="{{ form.contact.value|default:'' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Employee Type *</label>
                            <select name="employee_type" class="form-select" required>
                                <option value="">-- Select Type --</option>
                                <option value="full_time" {% if form.employee_type.value == 'full_time' %}selected{% endif %}>Full Time</option>
                                <option value="part_time" {% if form.employee_type.value == 'part_time' %}selected{% endif %}>Part Time</option>
                                <option value="contract" {% if form.employee_type.value == 'contract' %}selected{% endif %}>Contract</option>
                                <option value="casual" {% if form.employee_type.value == 'casual' %}selected{% endif %}>Casual</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Position</label>
                            <input type="text" name="position" class="form-control" placeholder="e.g. Manager" value="{{ form.position.value|default:'' }}">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Department</label>
                            <input type="text" name="department" class="form-control" placeholder="e.g. Operations" value="{{ form.department.value|default:'' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Monthly Salary</label>
                            <input type="number" name="salary" id="salary" class="form-control" min="0" step="0.01" value="{{ form.salary.value|default:'0' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Starting Date</label>
                            <input type="date" name="date_recruited" id="date_recruited" class="form-control" value="{{ form.date_recruited.value|default:'' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">End Date</label>
                            <input type="date" name="date_dismissed" id="date_dismissed" class="form-control" value="{{ form.date_dismissed.value|default:'' }}">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label">Status</label>
                            <select name="is_active" class="form-select">
                                <option value="1" {% if form.is_active.value %}selected{% endif %}>Active</option>
                                <option value="0" {% if not form.is_active.value %}selected{% endif %}>Inactive</option>
                            </select>
                        </div>
                    </div>
                    <hr>
                    <h5 class="mb-3">Calculated Values</h5>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Days Worked</label>
                            <input type="text" id="days_worked" class="form-control bg-light" readonly placeholder="Auto-calculated">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Daily Salary</label>
                            <input type="text" id="daily_salary" class="form-control bg-light" readonly placeholder="Auto-calculated">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Pension Amount (10%)</label>
                            <input type="text" id="pension_amount" class="form-control bg-light" readonly placeholder="Auto-calculated">
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> {{ action }}
                        </button>
                        <a href="{% url 'employee_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    function calculateDays() {
        var dateRecruited = document.getElementById('date_recruited').value;
        var dateDismissed = document.getElementById('date_dismissed').value;
        var salary = parseFloat(document.getElementById('salary').value) || 0;
        
        if (!dateRecruited) {
            document.getElementById('days_worked').value = '0';
            document.getElementById('daily_salary').value = '0.00';
            document.getElementById('pension_amount').value = '0.00';
            return;
        }
        
        var startDate = new Date(dateRecruited);
        var endDate = dateDismissed ? new Date(dateDismissed) : new Date();
        var timeDiff = endDate - startDate;
        var daysWorked = Math.max(0, Math.ceil(timeDiff / (1000 * 60 * 60 * 24)));
        
        var dailySalary = salary / 30;
        var pensionAmount = (dailySalary * daysWorked * 0.10).toFixed(2);
        
        document.getElementById('days_worked').value = daysWorked;
        document.getElementById('daily_salary').value = dailySalary.toFixed(2);
        document.getElementById('pension_amount').value = pensionAmount;
    }
    
    document.getElementById('date_recruited').addEventListener('change', calculateDays);
    document.getElementById('date_recruited').addEventListener('input', calculateDays);
    document.getElementById('date_dismissed').addEventListener('change', calculateDays);
    document.getElementById('date_dismissed').addEventListener('input', calculateDays);
    document.getElementById('salary').addEventListener('input', calculateDays);
    document.getElementById('salary').addEventListener('change', calculateDays);
    
    calculateDays();
});
</script>
{% endblock %}
