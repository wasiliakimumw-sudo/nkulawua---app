{% extends "accounting_app/base.html" %}
{% block title %}Offline{% endblock %}

{% block content %}
<div class="container text-center py-5">
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-body p-5">
            <i class="bi bi-wifi-off text-muted" style="font-size: 4rem;"></i>
            <h3 class="mt-4">You're Offline</h3>
            <p class="text-muted">Please check your internet connection and try again.</p>
            <button class="btn btn-primary" onclick="window.location.reload()">
                <i class="bi bi-arrow-clockwise me-2"></i>Try Again
            </button>
        </div>
    </div>
    
    <div class="card border-0 shadow-sm mt-4" style="border-radius: 16px;">
        <div class="card-body">
            <h5>Offline Mode</h5>
            <p class="text-muted small">This app can work offline. Your data will sync when connection is restored.</p>
            <a href="/" class="btn btn-outline-primary">
                <i class="bi bi-house me-2"></i>Go to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
