{% extends "accounting_app/base.html" %}
{% block title %}Search Demo{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h4 class="mb-4">Autocomplete Search Demo</h4>
            
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0"><i class="bi bi-search"></i> Search Beneficiaries</h6>
                </div>
                <div class="card-body">
                    <div class="autocomplete-wrapper position-relative">
                        <input 
                            type="text" 
                            id="beneficiary-search" 
                            class="form-control" 
                            placeholder="Type at least 2 characters..." 
                            autocomplete="off"
                            data-search-type="beneficiary"
                        >
                        <input type="hidden" id="beneficiary-id">
                        <div id="beneficiary-suggestions" class="autocomplete-dropdown"></div>
                    </div>
                    <div id="selected-result" class="mt-3 alert alert-success" style="display: none;">
                        <i class="bi bi-check-circle"></i> Selected: <strong id="selected-name"></strong>
                    </div>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header bg-info text-white">
                    <h6 class="mb-0"><i class="bi bi-person"></i> Search Users</h6>
                </div>
                <div class="card-body">
                    <div class="autocomplete-wrapper position-relative">
                        <input 
                            type="text" 
                            id="user-search" 
                            class="form-control" 
                            placeholder="Type at least 2 characters..." 
                            autocomplete="off"
                            data-search-type="user"
                        >
                        <input type="hidden" id="user-id">
                        <div id="user-suggestions" class="autocomplete-dropdown"></div>
                    </div>
                    <div id="selected-user-result" class="mt-3 alert alert-info" style="display: none;">
                        <i class="bi bi-check-circle"></i> Selected: <strong id="selected-user-name"></strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.autocomplete-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    z-index: 1050;
    background: white;
    border: 1px solid #dee2e6;
    border-radius: 0.375rem;
    box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
    max-height: 250px;
    overflow-y: auto;
    display: none;
}

.autocomplete-dropdown.show {
    display: block;
}

.autocomplete-item {
    padding: 0.625rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    transition: background-color 0.15s ease;
}

.autocomplete-item:last-child {
    border-bottom: none;
}

.autocomplete-item:hover,
.autocomplete-item.active {
    background-color: #e9ecef;
}

.autocomplete-item .highlight {
    background-color: #fff3cd;
    padding: 0 2px;
    border-radius: 2px;
}

.autocomplete-no-results {
    padding: 0.75rem 1rem;
    color: #6c757d;
    text-align: center;
    font-size: 0.875rem;
}

.autocomplete-loading {
    padding: 0.75rem 1rem;
    color: #6c757d;
    text-align: center;
}

.autocomplete-loading::after {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #dee2e6;
    border-top-color: #0d6efd;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-left: 8px;
    vertical-align: middle;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
class Autocomplete {
    constructor(inputId, options = {}) {
        this.input = document.getElementById(inputId);
        this.dropdownId = options.dropdownId || inputId + '-suggestions';
        this.hiddenInputId = options.hiddenInputId || inputId.replace('-search', '-id');
        this.searchType = options.searchType || this.input.dataset.searchType || 'beneficiary';
        this.minChars = options.minChars || 2;
        this.debounceTime = options.debounceTime || 300;
        this.onSelect = options.onSelect || null;
        
        this.dropdown = document.getElementById(this.dropdownId);
        this.hiddenInput = document.getElementById(this.hiddenInputId);
        this.debounceTimer = null;
        this.selectedIndex = -1;
        
        this.init();
    }
    
    init() {
        this.input.addEventListener('input', () => this.handleInput());
        this.input.addEventListener('keydown', (e) => this.handleKeyDown(e));
        document.addEventListener('click', (e) => this.handleClickOutside(e));
    }
    
    handleInput() {
        clearTimeout(this.debounceTimer);
        const query = this.input.value.trim();
        
        this.selectedIndex = -1;
        
        if (query.length < this.minChars) {
            this.hide();
            return;
        }
        
        this.debounceTimer = setTimeout(() => this.fetchSuggestions(query), this.debounceTime);
    }
    
    handleKeyDown(e) {
        if (!this.dropdown.classList.contains('show')) return;
        
        const items = this.dropdown.querySelectorAll('.autocomplete-item');
        
        switch (e.key) {
            case 'ArrowDown':
                e.preventDefault();
                this.selectedIndex = Math.min(this.selectedIndex + 1, items.length - 1);
                this.highlightItem(items);
                break;
            case 'ArrowUp':
                e.preventDefault();
                this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
                this.highlightItem(items);
                break;
            case 'Enter':
                e.preventDefault();
                if (this.selectedIndex >= 0 && items[this.selectedIndex]) {
                    this.selectItem(items[this.selectedIndex]);
                }
                break;
            case 'Escape':
                this.hide();
                break;
        }
    }
    
    highlightItem(items) {
        items.forEach((item, index) => {
            item.classList.toggle('active', index === this.selectedIndex);
        });
    }
    
    handleClickOutside(e) {
        if (!this.input.contains(e.target) && !this.dropdown.contains(e.target)) {
            this.hide();
        }
    }
    
    async fetchSuggestions(query) {
        this.showLoading();
        
        try {
            const url = `/search-suggestions/?q=${encodeURIComponent(query)}&type=${this.searchType}`;
            const response = await fetch(url);
            
            if (!response.ok) throw new Error('Network error');
            
            const data = await response.json();
            this.renderSuggestions(data.suggestions, query);
        } catch (error) {
            console.error('Autocomplete error:', error);
            this.showError();
        }
    }
    
    renderSuggestions(suggestions, query) {
        this.dropdown.innerHTML = '';
        
        if (suggestions.length === 0) {
            this.dropdown.innerHTML = '<div class="autocomplete-no-results">No results found</div>';
            this.show();
            return;
        }
        
        suggestions.forEach((item) => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.dataset.id = item.id;
            div.innerHTML = this.highlightText(item.label, query);
            div.addEventListener('click', () => this.selectItem(div));
            this.dropdown.appendChild(div);
        });
        
        this.show();
    }
    
    highlightText(text, query) {
        const regex = new RegExp(`(${this.escapeRegex(query)})`, 'gi');
        return text.replace(regex, '<span class="highlight">$1</span>');
    }
    
    escapeRegex(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    selectItem(item) {
        const id = item.dataset.id;
        const label = item.textContent.trim();
        
        this.input.value = label;
        if (this.hiddenInput) this.hiddenInput.value = id;
        this.hide();
        
        if (this.onSelect) {
            this.onSelect({ id, label });
        }
    }
    
    showLoading() {
        this.dropdown.innerHTML = '<div class="autocomplete-loading">Searching</div>';
        this.show();
    }
    
    showError() {
        this.dropdown.innerHTML = '<div class="autocomplete-no-results">Error loading suggestions</div>';
        this.show();
    }
    
    show() {
        this.dropdown.classList.add('show');
    }
    
    hide() {
        this.dropdown.classList.remove('show');
        this.selectedIndex = -1;
    }
}

document.addEventListener('DOMContentLoaded', function() {
    new Autocomplete('beneficiary-search', {
        searchType: 'beneficiary',
        minChars: 2,
        debounceTime: 250,
        onSelect: function(selected) {
            document.getElementById('selected-name').textContent = selected.label;
            document.getElementById('selected-result').style.display = 'block';
            console.log('Selected beneficiary:', selected);
        }
    });
    
    new Autocomplete('user-search', {
        searchType: 'user',
        minChars: 2,
        debounceTime: 250,
        onSelect: function(selected) {
            document.getElementById('selected-user-name').textContent = selected.label;
            document.getElementById('selected-user-result').style.display = 'block';
            console.log('Selected user:', selected);
        }
    });
});
</script>
{% endblock %}
